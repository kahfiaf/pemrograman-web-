version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=djangodb
      - POSTGRES_USER=djangouser
      - POSTGRES_PASSWORD=supersecurepassword
    networks:
      - django_net

  web:
    build: .
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    environment:
      - DEBUG=0
      - SECRET_KEY=ganti_dengan_key_produksi_anda
      - DATABASE_URL=postgres://djangouser:supersecurepassword@db:5432/djangodb
    depends_on:
      - db
    networks:
      - django_net

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    depends_on:
      - web
    networks:
      - django_net

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  django_net:
    driver: bridge