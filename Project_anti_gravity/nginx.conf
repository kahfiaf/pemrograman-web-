# Konfigurasi upstream ke Gunicorn
upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name nama_domain_anda.com;
    client_max_body_size 20M;

    # Optimasi Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Penanganan Static Files (Langsung disajikan oleh Nginx, bypass Django)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Penanganan Media Files
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }

    # Forward Dynamic Requests ke Django
    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
        
        # Optimasi Buffer untuk mencegah bottleneck
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 64k;
    }
}